<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky-3D 產品管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --bg:#0e0f11;--surface:#16181c;--s2:#1e2128;--border:#2a2d36;
  --accent:#e8ff47;--a2:#47b8ff;--text:#e8eaf0;--dim:#7a7f8e;--dimmer:#444854;
  --green:#4dff91;--orange:#ff9447;--red:#ff4747;--purple:#b47fff;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.logo-mark{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:3px;text-transform:uppercase}
.logo-title{font-size:15px;font-weight:700;margin-top:4px;line-height:1.3}
.admin-chip{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:2px 8px;background:rgba(232,255,71,.12);border:1px solid rgba(232,255,71,.3);border-radius:4px;font-size:10px;color:var(--accent);font-family:'Space Mono',monospace}
.nav{padding:16px 12px;flex:1}
.nav-label{font-size:10px;letter-spacing:2px;color:var(--dimmer);text-transform:uppercase;padding:0 8px;margin-bottom:6px;margin-top:16px}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border:none;background:transparent;color:var(--dim);border-radius:var(--rs);cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;text-align:left}
.nb:hover{background:var(--s2);color:var(--text)}.nb.active{background:rgba(232,255,71,.1);color:var(--accent)}
.nb.ao{display:none}.nb.ao.vis{display:flex}
.ni{font-size:15px;width:18px;text-align:center}
.nbadge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-family:'Space Mono',monospace;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}

/* MAIN */
.main{flex:1;overflow-y:auto}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;backdrop-filter:blur(10px)}
.topbar-title{font-size:17px;font-weight:700}
.topbar-actions{display:flex;gap:10px}
.pi{padding:24px 28px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bp{background:var(--accent);color:#0e0f11}.bp:hover:not(:disabled){background:#d4ea30}
.bs{background:var(--s2);color:var(--text);border:1px solid var(--border)}.bs:hover:not(:disabled){border-color:var(--dim)}
.bg{background:transparent;color:var(--dim);border:1px solid var(--border)}.bg:hover:not(:disabled){color:var(--text);border-color:var(--dim)}
.bd{background:rgba(255,71,71,.15);color:var(--red);border:1px solid rgba(255,71,71,.3)}
.bo{background:rgba(255,148,71,.15);color:var(--orange);border:1px solid rgba(255,148,71,.3)}
.bsm{padding:5px 10px;font-size:12px}

/* PAGES */
.page{display:none}.page.active{display:block;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.sc.cl{cursor:pointer;transition:all .15s}.sc.cl:hover{border-color:var(--accent)}
.sl{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.sv{font-family:'Space Mono',monospace;font-size:26px;font-weight:700}

/* FILTER */
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.sw{position:relative;flex:1;min-width:200px}
.sw input{width:100%;padding:9px 14px 9px 36px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.sw input:focus{border-color:var(--accent)}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dimmer);font-size:14px}
.tf{display:flex;gap:6px;flex-wrap:wrap}
.tp{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--surface);color:var(--dim);cursor:pointer;transition:all .15s}
.tp:hover{border-color:var(--dim);color:var(--text)}.tp.active{border-color:var(--accent);background:rgba(232,255,71,.1);color:var(--accent)}

/* SECTION DIVIDER */
.section-div{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dimmer);margin:20px 0 12px;display:flex;align-items:center;gap:10px}
.section-div::after{content:'';flex:1;height:1px;background:var(--border)}

/* PRODUCT GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .2s;position:relative}
.pcard:hover{border-color:rgba(232,255,71,.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.pcard.pinned-card{border-color:rgba(232,255,71,.25)}
.pin-indicator{position:absolute;top:8px;left:8px;z-index:4;font-size:13px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}

.cprev{height:170px;background:var(--s2);position:relative;overflow:hidden}
.prev-tabs{position:absolute;top:6px;right:6px;z-index:3;display:flex;gap:4px}
.prev-tab{padding:2px 8px;font-size:10px;border-radius:4px;border:1px solid rgba(255,255,255,.1);cursor:pointer;font-family:inherit;background:rgba(14,15,17,.7);color:var(--dim)}
.prev-tab.active{background:rgba(232,255,71,.2);color:var(--accent);border-color:rgba(232,255,71,.4)}
.prev-panel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.prev-panel.hidden{display:none}
.prev-img{width:100%;height:100%;object-fit:cover}
.pholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--dimmer);cursor:pointer}
.pholder .icon{font-size:40px}
.cbody{padding:14px}
.cname{font-size:14px;font-weight:700;margin-bottom:4px;cursor:pointer}.cname:hover{color:var(--accent)}
.cdesc{font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:10px;min-height:36px}
.cfooter{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.ctags{display:flex;gap:4px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;background:var(--s2);color:var(--dim);border:1px solid var(--border)}
.cacts{display:flex;gap:4px;padding:10px 14px 12px;border-top:1px solid var(--border);margin-top:4px}
.cvbadge{font-family:'Space Mono',monospace;font-size:10px;color:var(--dimmer)}
.cstatus{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;z-index:2}
.cs-done{background:rgba(77,255,145,.15);color:var(--green);border:1px solid rgba(77,255,145,.3)}
.cs-fix{background:rgba(255,148,71,.15);color:var(--orange);border:1px solid rgba(255,148,71,.3)}
.fix-badge{position:absolute;bottom:8px;left:8px;background:var(--orange);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;z-index:4}

/* VERSION SELECT */
.vsel{background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:11px;font-family:'Space Mono',monospace;padding:3px 6px;border-radius:4px;cursor:pointer;outline:none}
.vsel:focus{border-color:var(--accent)}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.mo.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:90%;max-width:700px;max-height:90vh;overflow-y:auto}
.modal-lg{max-width:900px}
.modal-xl{max-width:1000px}
.mhdr{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 24px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.mclose{background:var(--s2);border:none;color:var(--dim);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.mclose:hover{color:var(--text)}
.mbody{padding:20px 24px}
.mfoot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fi{display:flex;flex-direction:column;gap:6px}
.fi.full{grid-column:1/-1}
.fl{font-size:12px;color:var(--dim);font-weight:500}
.fi input,.fi select,.fi textarea{padding:9px 12px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--accent)}
.fi select option{background:var(--s2)}
.fi textarea{min-height:80px;resize:vertical;line-height:1.5}

/* TAG INPUT */
.tiw{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);min-height:42px;cursor:text;align-items:center}
.tiw:focus-within{border-color:var(--accent)}
.tchip{display:inline-flex;align-items:center;gap:4px;background:rgba(232,255,71,.1);border:1px solid rgba(232,255,71,.3);color:var(--accent);font-size:11px;padding:2px 8px;border-radius:4px}
.tcr{background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;line-height:1;padding:0}
.tii{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;min-width:80px;flex:1}
.tdd{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);position:absolute;top:calc(100% + 2px);left:0;right:0;z-index:300;max-height:180px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.tdi{padding:8px 12px;font-size:13px;cursor:pointer}.tdi:hover{background:var(--s2)}
.tdn{color:var(--accent)}.tip{position:relative;flex:1;min-width:80px}

/* UPLOAD ZONE */
.upz{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;color:var(--dim);font-size:13px;cursor:pointer;transition:all .2s;position:relative}
.upz:hover,.upz.drag{border-color:var(--accent);color:var(--accent)}
.upz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upi{font-size:28px;margin-bottom:8px}
.uprog{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.uprog-bar{height:100%;background:var(--accent);width:0;transition:width .3s;border-radius:2px}

/* STL VIEWER */
.d3w{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);height:280px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;margin-bottom:12px}
.stl-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--dimmer);background:rgba(0,0,0,.6);padding:2px 10px;border-radius:4px;pointer-events:none}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tbb{padding:8px 16px;font-size:13px;font-family:inherit;background:none;border:none;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tbb.active{color:var(--accent);border-bottom-color:var(--accent)}
.tbp{display:none}.tbp.active{display:block}

/* ORDERS TABLE */
.ot{width:100%;border-collapse:collapse}
.ot th{text-align:left;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dimmer);padding:8px 12px;border-bottom:1px solid var(--border)}
.ot td{padding:11px 12px;border-bottom:1px solid rgba(42,45,54,.5);font-size:13px;vertical-align:middle}
.ot tr:hover td{background:rgba(255,255,255,.02)}

/* BATCH ORDER items inside table */
.batch-items{margin-top:4px;display:flex;flex-direction:column;gap:2px}
.batch-item-row{font-size:11px;color:var(--dim);padding:1px 0}

/* ORDER STATUS */
.os{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.os::before{content:'';width:5px;height:5px;border-radius:50%;display:inline-block}
.os-unread{background:rgba(255,71,71,.15);color:var(--red)}.os-unread::before{background:var(--red)}
.os-received{background:rgba(232,255,71,.1);color:var(--accent)}.os-received::before{background:var(--accent)}
.os-printing{background:rgba(71,184,255,.1);color:var(--a2)}.os-printing::before{background:var(--a2)}
.os-done{background:rgba(77,255,145,.1);color:var(--green)}.os-done::before{background:var(--green)}
.os-delivered{background:rgba(180,127,255,.15);color:var(--purple)}.os-delivered::before{background:var(--purple)}

/* BATCH ORDER FORM */
.batch-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 0.7fr auto;gap:8px;align-items:end;padding:10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px}
.batch-row .fl{font-size:11px}
.batch-row input,.batch-row select{padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:12px;font-family:inherit;outline:none}
.batch-row input:focus,.batch-row select:focus{border-color:var(--accent)}
.batch-row select option{background:var(--s2)}
.batch-del-btn{padding:7px 10px;background:rgba(255,71,71,.1);border:1px solid rgba(255,71,71,.3);border-radius:var(--rs);color:var(--red);cursor:pointer;font-size:14px;line-height:1}
.batch-del-btn:hover{background:rgba(255,71,71,.2)}

/* GROUPS */
.group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.group-name{font-size:14px;font-weight:700;flex:1}
.group-count{font-size:11px;color:var(--dim);font-family:'Space Mono',monospace}
.group-actions{display:flex;gap:6px}

/* FIX REQUESTS */
.fxi{background:rgba(255,148,71,.05);border:1px solid rgba(255,148,71,.2);border-radius:var(--rs);padding:10px 14px;font-size:12px;margin-bottom:8px}
.fxh{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.fxa{font-weight:700;color:var(--orange)}.fxd{color:var(--dimmer);font-size:11px}
.fxt{color:var(--dim);line-height:1.5}
.fxr{background:none;border:none;color:var(--dimmer);cursor:pointer;font-size:11px;margin-top:6px;padding:0}.fxr:hover{color:var(--green)}

/* TODO */
.todo-list{display:flex;flex-direction:column;gap:8px}
.todo-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.todo-item:hover{border-color:var(--dim)}
.todo-icon{font-size:20px;flex-shrink:0}
.todo-body{flex:1}.todo-name{font-size:13px;font-weight:600;margin-bottom:2px}.todo-sub{font-size:11px;color:var(--dim)}
.todo-meta{font-size:11px;color:var(--dimmer);text-align:right;flex-shrink:0}
.todo-item.urgent{border-color:rgba(255,71,71,.3)}.todo-item.urgent .todo-meta{color:var(--red);font-weight:600}

/* SETTINGS */
.stsec{margin-bottom:28px}
.stitle{font-size:13px;font-weight:700;margin-bottom:12px}
.slist{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.schip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--s2);color:var(--text)}
.sdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sdel{background:none;border:none;color:var(--dimmer);cursor:pointer;font-size:14px;padding:0;line-height:1}.sdel:hover{color:var(--red)}
.ail{display:flex;gap:8px;align-items:center}.ail input{flex:1}
input[type=color]{width:36px;height:36px;border:1px solid var(--border);border-radius:var(--rs);background:none;cursor:pointer;padding:2px}
.mcbind-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs)}
.mcbind-mat{font-weight:600;min-width:60px;font-size:13px}
.mcbind-colors{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.mcbind-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.mcbind-chip.selected{border-color:var(--accent);background:rgba(232,255,71,.1);color:var(--accent)}
.ccdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* DETAIL */
.mr{display:flex;justify-content:space-between;font-size:12px;padding:7px 0;border-bottom:1px solid var(--border)}
.mk{color:var(--dim)}.mv{font-weight:500}
.clt{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dimmer);margin-bottom:10px}
.cli{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:flex-start}
.clv{font-family:'Space Mono',monospace;color:var(--accent);width:40px;flex-shrink:0}
.cln{color:var(--dim);flex:1}.cld{color:var(--dimmer);white-space:nowrap}
.cli-stl{font-size:10px;color:var(--a2);margin-top:2px}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px 36px;width:340px;text-align:center}
.login-logo{font-family:'Space Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:3px;margin-bottom:8px}
.login-title{font-size:18px;font-weight:700;margin-bottom:24px}
.pin-input{width:100%;padding:12px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:18px;font-family:'Space Mono',monospace;text-align:center;letter-spacing:8px;outline:none;margin-bottom:12px}
.pin-input:focus{border-color:var(--accent)}
.pin-err{color:var(--red);font-size:12px;margin-top:6px}

/* EMPTY / LOADING */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--dimmer);gap:12px}
.empty .icon{font-size:48px}.empty .ttl{font-size:16px;color:var(--dim);font-weight:600}.empty .sub{font-size:13px}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--dimmer);gap:10px;font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 18px;font-size:13px;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-left:3px solid var(--green)}
.toast.info{border-left:3px solid var(--a2)}
.toast.error{border-left:3px solid var(--red)}

@media(max-width:700px){
  .sidebar{width:60px}
  .logo-title,.nb span:not(.ni),.nav-label,.admin-chip{display:none}
  .stats-row{grid-template-columns:1fr 1fr}
  .fg{grid-template-columns:1fr}.fi.full{grid-column:1}
  .pi{padding:16px}.modal-lg,.modal-xl{max-width:98vw}
  .batch-row{grid-template-columns:1fr 1fr;gap:6px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap" style="display:none">
  <div class="login-box">
    <div class="login-logo">LUCKY-3D</div>
    <div class="login-title">管理員登入</div>

<script>
// ════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════
const WORKER_URL = "https://lucky-3d.lucky20071211.workers.dev";
const GH_OWNER   = "Lucky-1211";
const GH_REPO    = "Lucky-3D.github.io";

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let products=[], orders=[], groups=[], settings={colors:[],materials:[],allTags:[],matColors:{}};
let isAdmin=false, adminPin="";
let activeTag="all", activeDetailId=null, viewingVer=null;
let editingId=null, editingGroupId=null;
let selectedTags=[], selectedGroupProductIds=[];
let pendingImgUrl="", pendingStlUrl="";
let dPreviewMode="img", todoTab="print";

// ════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════
window.onload = () => {
  const saved = sessionStorage.getItem("l3d-admin");
  if (saved) { adminPin=saved; isAdmin=true; startApp(); }
  else document.getElementById("login-screen").style.display="flex";
};
async function doLogin() {
  const pin = document.getElementById("pin-input").value.trim(); if(!pin)return;
  const res = await api("/auth","POST",{},pin);
  if(res?.ok){ adminPin=pin; isAdmin=true; sessionStorage.setItem("l3d-admin",pin); document.getElementById("login-screen").style.display="none"; startApp(); }
  else document.getElementById("pin-err").textContent="密碼錯誤";
}
function continueAsGuest(){ isAdmin=false; adminPin=""; document.getElementById("login-screen").style.display="none"; startApp(); }
function logout(){ sessionStorage.removeItem("l3d-admin"); isAdmin=false; adminPin=""; document.getElementById("main-app").style.display="none"; document.getElementById("login-screen").style.display="flex"; document.getElementById("pin-input").value=""; document.getElementById("pin-err").textContent=""; }
function startApp(){ document.getElementById("main-app").style.display="flex"; applyAdminUI(); loadAll(); }
function applyAdminUI(){
  document.querySelectorAll(".ao").forEach(el=>el.classList.toggle("vis",isAdmin));
  document.getElementById("admin-chip").style.display=isAdmin?"":"none";
  document.getElementById("logout-lbl").textContent=isAdmin?"登出管理員":"切換身份";
}

// ════════════════════════════════════════
//  API
// ════════════════════════════════════════
async function api(path, method="GET", body, pin){
  const h={"Content-Type":"application/json"};
  const p=pin||adminPin; if(p)h["X-Admin-Pin"]=p;
  try{
    const res=await fetch(WORKER_URL+path,{method,headers:h,body:body&&method!=="GET"?JSON.stringify(body):undefined});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`HTTP ${res.status}`);}
    return res.json();
  }catch(e){showToast("❌ "+e.message,"error");return null;}
}

async function loadAll(){
  document.getElementById("pgrid").innerHTML=`<div class="loading" style="grid-column:1/-1"><div class="spinner"></div>載入中…</div>`;
  const [prods,ords,grps,cfg]=await Promise.all([api("/products"),api("/orders"),api("/groups"),api("/settings")]);
  if(prods) products=prods;
  if(ords)  orders=ords;
  if(grps)  groups=grps;
  if(cfg)   settings={colors:cfg.colors||[],materials:cfg.materials||[],allTags:cfg.allTags||[],matColors:cfg.matColors||{}};
  render();
}

// ════════════════════════════════════════
//  GITHUB UPLOAD
// ════════════════════════════════════════
async function uploadToGH(file, folder, barId, wrapId, lblId){
  document.getElementById(wrapId).style.display="";
  document.getElementById(lblId).textContent=`上傳中：${file.name}…`;
  const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
  document.getElementById(barId).style.width="60%";
  const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
  const path=`${folder}/${Date.now()}_${safeName}`;
  const result=await api("/upload","POST",{path,base64,message:`upload ${safeName}`});
  if(result?.url){
    document.getElementById(barId).style.width="100%";
    document.getElementById(lblId).textContent=`✅ ${file.name}`;
    setTimeout(()=>{document.getElementById(wrapId).style.display="none";document.getElementById(barId).style.width="0";},1500);
    return result.url;
  }else{
    document.getElementById(barId).style.width="0"; document.getElementById(wrapId).style.display="none";
    document.getElementById(lblId).textContent="❌ 上傳失敗";
    return null;
  }
}
function handleImgPick(e){const f=e.target.files[0];if(f)doImgUpload(f);}
function handleImgDrop(e){e.preventDefault();document.getElementById("img-upz").classList.remove("drag");const f=e.dataTransfer.files[0];if(f)doImgUpload(f);}
async function doImgUpload(file){const url=await uploadToGH(file,"images","img-bar","img-progress","img-uplbl");if(url){pendingImgUrl=url;const p=document.getElementById("f-imgpreview");p.src=url;p.style.display="";}}
function handleStlPick(e){const f=e.target.files[0];if(f)doStlUpload(f);}
function handleStlDrop(e){e.preventDefault();document.getElementById("stl-upz").classList.remove("drag");const f=e.dataTransfer.files[0];if(f)doStlUpload(f);}
async function doStlUpload(file){const url=await uploadToGH(file,"models","stl-bar","stl-progress","stl-uplbl");if(url){pendingStlUrl=url;const sc=document.getElementById("stl-current");sc.style.display="";sc.innerHTML=`📦 <a href="${url}" target="_blank" style="color:var(--a2)">${file.name}</a>`;}}

// ════════════════════════════════════════
//  NAV
// ════════════════════════════════════════
function go(page,opts){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nb").forEach(b=>b.classList.remove("active"));
  document.getElementById("page-"+page).classList.add("active");
  const nb=document.getElementById("nav-"+page); if(nb)nb.classList.add("active");
  if(page==="products") render();
  if(page==="orders")   renderOrders();
  if(page==="neworder") renderNewOrder();
  if(page==="groups")   renderGroups();
  if(page==="settings") renderSettings();
  if(page==="todo")     renderTodo(opts?.tab);
}

const tagEmoji=t=>("📦");

function renderTagFilter(){
  document.getElementById("tag-filter").innerHTML=
    `<span class="tp ${activeTag==="all"?"active":""}" onclick="setTag('all')">全部</span>`+
    settings.allTags.map(t=>`<span class="tp ${activeTag===t?"active":""}" onclick="setTag('${t}')">${t}</span>`).join("");
}
function setTag(t){activeTag=t;renderTagFilter();renderProducts();}

function renderProducts(){
  const q=(document.getElementById("search-input").value||"").toLowerCase();
  const all=products.filter(p=>(activeTag==="all"||p.tags.includes(activeTag))&&(!q||p.name.toLowerCase().includes(q)));
  const pinned=all.filter(p=>p.pinned);
  const normal=all.filter(p=>!p.pinned);
  const grid=document.getElementById("pgrid");

  if(!all.length){grid.innerHTML=`<div class="pgrid"><div class="empty" style="grid-column:1/-1"><div class="icon">🔍</div><div class="ttl">沒有符合的產品</div></div></div>`;return;}

  let html="";
  if(pinned.length){
    html+=`<div class="section-div">📌 置頂</div><div class="pgrid">${pinned.map(renderCard).join("")}</div>`;
  }
  if(normal.length){
    if(pinned.length) html+=`<div class="section-div">所有產品</div>`;
    html+=`<div class="pgrid">${normal.map(renderCard).join("")}</div>`;
  }
  grid.innerHTML=html;

  // init mini STL
  all.filter(p=>p.versions?.find(v=>v.ver===p.curVer)?.stlUrl).forEach(p=>{
    const el=document.getElementById("mini-"+p.id);
    if(el) initMini(el, p.versions.find(v=>v.ver===p.curVer).stlUrl);
  });
}

function renderCard(p){
  const openFix=(p.fixRequests||[]).filter(f=>!f.resolved).length;
  const sdone=p.status==="done";
  const curVd=p.versions?.find(v=>v.ver===p.curVer);
  const hasImg=!!curVd?.imageUrl;
  const hasStl=!!curVd?.stlUrl;
  return `<div class="pcard ${p.pinned?"pinned-card":""}">
    ${p.pinned?`<div class="pin-indicator">📌</div>`:""}
    ${openFix?`<div class="fix-badge">🔧 ${openFix}</div>`:""}
    <div class="cstatus ${sdone?"cs-done":"cs-fix"}">${sdone?"✅ 完成":"🔧 待修改"}</div>
    <div class="cprev">
      ${(hasImg||hasStl)?`<div class="prev-tabs">
        ${hasImg?`<button class="prev-tab active" id="ptab-img-${p.id}" onclick="switchCardPrev(event,'${p.id}','img')">🖼</button>`:""}
        ${hasStl?`<button class="prev-tab ${hasImg?"":"active"}" id="ptab-3d-${p.id}" onclick="switchCardPrev(event,'${p.id}','3d')">📦</button>`:""}
      </div>`:""}
      <div class="prev-panel" id="ppanel-img-${p.id}" style="${!hasImg?"display:none":""}">
        ${hasImg?`<img class="prev-img" src="${curVd.imageUrl}" alt="${p.name}" loading="lazy" onclick="openDetail('${p.id}')" onerror="this.parentElement.style.display='none'">`:""}
      </div>
      <div class="prev-panel ${hasImg?"hidden":""}" id="ppanel-3d-${p.id}">
        ${hasStl?`<div id="mini-${p.id}" style="width:100%;height:100%"></div>`
          :`<div class="pholder" onclick="openDetail('${p.id}')"><div class="icon">${tagEmoji(p.tags[0])}</div><div style="font-size:11px;color:var(--dimmer)">點擊查看</div></div>`}
      </div>
    </div>
    <div class="cbody">
      <div class="cname" onclick="openDetail('${p.id}')">${p.name}</div>
      <div class="cdesc">${p.desc||"—"}</div>
      <div class="cfooter">
        <div class="ctags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
        <span class="cvbadge">${p.curVer}</span>
      </div>
    </div>
    <div class="cacts">
      <button class="btn bg bsm" style="flex:1" onclick="openDetail('${p.id}')">詳情</button>
      ${isAdmin?`<button class="btn bs bsm" style="flex:1" onclick="openVerUpdate('${p.id}')">↑ 更新</button>`:""}
      ${isAdmin?`<button class="btn ${p.pinned?"bp":"bg"} bsm" onclick="togglePin('${p.id}',${!p.pinned})" title="${p.pinned?"取消置頂":"置頂"}">📌</button>`:""}
      ${isAdmin?`<button class="btn bd bsm" onclick="deleteProduct('${p.id}')">🗑</button>`:""}
      <button class="btn bp bsm" onclick="quickOrder('${p.id}')" title="要列印">🖨️</button>
    </div>
  </div>`;
}

function switchCardPrev(e,pid,mode){
  e.stopPropagation();
  document.getElementById(`ppanel-img-${pid}`)?.classList.toggle("hidden",mode!=="img");
  document.getElementById(`ppanel-3d-${pid}`)?.classList.toggle("hidden",mode!=="3d");
  document.getElementById(`ptab-img-${pid}`)?.classList.toggle("active",mode==="img");
  document.getElementById(`ptab-3d-${pid}`)?.classList.toggle("active",mode==="3d");
}

async function togglePin(id, pinned){
  const res=await api(`/products/${id}/pin`,"PATCH",{pinned});
  if(res?.ok){const p=products.find(x=>x.id===id);if(p)p.pinned=pinned;renderProducts();showToast(pinned?"📌 已置頂":"取消置頂","success");}
}

function updateStats(){
  document.getElementById("st-total").textContent=products.length;
  const of=products.reduce((a,p)=>a+(p.fixRequests||[]).filter(f=>!f.resolved).length,0);
  document.getElementById("st-fix").textContent=of;
  document.getElementById("st-pending").textContent=products.filter(p=>p.status==="fix").length;
  const act=orders.filter(o=>["unread","received","printing"].includes(o.status)).length;
  document.getElementById("st-print").textContent=act;
  const unread=orders.filter(o=>o.status==="unread").length;
  const bu=document.getElementById("badge-unread");bu.textContent=unread;bu.style.display=unread?"":"none";
  const tot=of+products.filter(p=>p.status==="fix").length+act;
  const bt=document.getElementById("badge-todo");bt.textContent=tot;bt.style.display=tot?"":"none";
}

function render(){updateStats();renderTagFilter();renderProducts();}

function switchTodoTab(tab){
  todoTab=tab;
  document.getElementById("todo-tab-print").classList.toggle("active",tab==="print");
  document.getElementById("todo-tab-fix").classList.toggle("active",tab==="fix");
  document.getElementById("todo-print-panel").style.display=tab==="print"?"":"none";
  document.getElementById("todo-fix-panel").style.display=tab==="fix"?"":"none";
}
function renderTodo(tab){
  if(tab)switchTodoTab(tab);else switchTodoTab(todoTab);
  const today=new Date().toISOString().split("T")[0];
  const OS_MAP={unread:"未讀",received:"收到",printing:"列印中"};
  const pending=orders.filter(o=>["unread","received","printing"].includes(o.status))
    .sort((a,b)=>{if(!a.date)return 1;if(!b.date)return -1;return new Date(a.date)-new Date(b.date);});
  const pp=document.getElementById("todo-print-panel");
  pp.innerHTML=!pending.length?`<div class="empty"><div class="icon">🎉</div><div class="ttl">沒有待列印的訂單</div></div>`
    :`<div class="todo-list">`+pending.map(o=>{
      const ov=o.date&&o.date<today;
      const name=o.items?.length?`批量訂單（${o.items.length}項）`:o.productName;
      const sub=o.items?.length?o.items.map(i=>`${i.productName} ${i.ver} · ${i.material} ${i.color} ×${i.qty}`).join("、")
        :`${o.material} · ${o.color} · ${o.qty}組${o.note?" · "+o.note:""}`;
      return `<div class="todo-item ${ov?"urgent":""}" onclick="go('orders')">
        <div class="todo-icon">🖨️</div>
        <div class="todo-body"><div class="todo-name">${name}</div><div class="todo-sub">${sub}</div></div>
        <div class="todo-meta"><div><span class="os os-${o.status}">${OS_MAP[o.status]}</span></div><div style="margin-top:4px">${o.date||"無期限"}${ov?" ⚠":""}</div></div>
      </div>`;}).join("")+`</div>`;

  const fixList=[];
  products.forEach(p=>{
    if(p.status==="fix")fixList.push({type:"status",p});
    (p.fixRequests||[]).filter(f=>!f.resolved).forEach(f=>fixList.push({type:"req",p,f}));
  });
  document.getElementById("todo-fix-panel").innerHTML=!fixList.length
    ?`<div class="empty"><div class="icon">🎉</div><div class="ttl">沒有待修改的項目</div></div>`
    :`<div class="todo-list">`+fixList.map(item=>item.type==="status"
      ?`<div class="todo-item" onclick="openDetail('${item.p.id}')"><div class="todo-icon">🔧</div><div class="todo-body"><div class="todo-name">${item.p.name}</div><div class="todo-sub">標記為待修改</div></div><div class="todo-meta">${item.p.updatedAt}</div></div>`
      :`<div class="todo-item" onclick="openDetail('${item.p.id}')"><div class="todo-icon">💬</div><div class="todo-body"><div class="todo-name">${item.p.name}</div><div class="todo-sub">${item.f.author}：${item.f.text}</div></div><div class="todo-meta">${item.f.date}</div></div>`
    ).join("")+`</div>`;
}

function openFixModal(){document.getElementById("fix-text").value="";openM("modal-fix");}
async function submitFix(){
  const text=document.getElementById("fix-text").value.trim();
  if(!text){showToast("❗ 請填寫說明","info");return;}
  const p=products.find(x=>x.id===activeDetailId);
  const fix={author:document.getElementById("fix-author").value.trim()||"匿名",text,date:new Date().toISOString().split("T")[0],resolved:false};
  const newFixes=[...(p.fixRequests||[]),fix];
  setBtnLoading("fix-submit-btn",true);
  const res=await api(`/products/${p.id}`,"PATCH",{...p,fixRequests:newFixes,status:"fix"});
  setBtnLoading("fix-submit-btn",false);
  if(res){const i=products.findIndex(x=>x.id===p.id);if(i>=0)products[i]=res;closeM("modal-fix");renderFixPanel(res);updateStats();renderProducts();document.getElementById("dt-fix-btn").click();showToast("🔧 修改請求已送出","info");}
}
function renderFixPanel(p){
  const fixes=p.fixRequests||[];
  const open=fixes.filter(f=>!f.resolved).length;
  document.getElementById("dt-fix-btn").textContent=`修改請求${open?` (${open})`:""}`;
  const panel=document.getElementById("d-fix-panel");
  if(!fixes.length){panel.innerHTML=`<div style="color:var(--dimmer);font-size:13px;padding:12px 0">目前沒有修改請求</div>`;return;}
  panel.innerHTML=fixes.map((f,i)=>`
    <div class="fxi" style="${f.resolved?"opacity:.45":""}">
      <div class="fxh"><span class="fxa">${f.author}</span><span class="fxd">${f.date}</span></div>
      <div class="fxt">${f.text}</div>
      ${!f.resolved&&isAdmin?`<button class="fxr" onclick="resolveFix('${p.id}',${i})">✓ 標記已解決</button>`:""}
      ${f.resolved?`<div style="font-size:10px;color:var(--green);margin-top:4px">✓ 已解決</div>`:""}
    </div>`).join("");
}
async function resolveFix(pid,idx){
  const p=products.find(x=>x.id===pid);
  const nf=p.fixRequests.map((f,i)=>i===idx?{...f,resolved:true}:f);
  const allDone=!nf.some(f=>!f.resolved);
  const res=await api(`/products/${pid}`,"PATCH",{...p,fixRequests:nf,status:allDone?"done":"fix"});
  if(res){const i=products.findIndex(x=>x.id===pid);if(i>=0)products[i]=res;renderFixPanel(res);updateStats();renderProducts();showToast("✅ 已標記解決","success");}
}

function openVerUpdate(pid){
  if(!isAdmin)return;
  const p=products.find(x=>x.id===pid);
  const curVd=p.versions?.find(v=>v.ver===p.curVer);
  editingId=pid;pendingImgUrl=curVd?.imageUrl||"";pendingStlUrl="";
  document.getElementById("form-title").textContent=`↑ 更新版本：${p.name}`;
  document.getElementById("f-name").value=p.name;document.getElementById("f-desc").value=p.desc||"";
  document.getElementById("f-ver").value=bumpVer(p.curVer);document.getElementById("f-change").value="";
  document.getElementById("f-status").value=p.status||"done";
  const prev=document.getElementById("f-imgpreview");
  if(curVd?.imageUrl){prev.src=curVd.imageUrl;prev.style.display="";}else prev.style.display="none";
  document.getElementById("img-uplbl").textContent=curVd?.imageUrl?"更換圖片（選填，不換則沿用上一版）":"拖曳或點擊上傳圖片";
  document.getElementById("stl-uplbl").textContent="上傳新版本 STL（強烈建議）";
  document.getElementById("stl-current").style.display="none";
  selectedTags=[...p.tags];renderTagChips();populateRecMat();document.getElementById("f-recmat").value=p.recMat||"";
  openM("modal-form");
}
const bumpVer=v=>{const m=v.match(/v(\d+)\.(\d+)/);return m?`v${m[1]}.${parseInt(m[2])+1}`:v+".1";};
function populateRecMat(){document.getElementById("f-recmat").innerHTML="<option value=''>不指定</option>"+settings.materials.map(m=>`<option value="${m}">${m}</option>`).join("");}

async function saveProduct(){
  if(!isAdmin)return;
  const name=document.getElementById("f-name").value.trim();
  if(!name){showToast("❗ 請填寫產品名稱","info");return;}
  const now=new Date().toISOString().split("T")[0];
  const ver=document.getElementById("f-ver").value.trim()||"v1.0";
  const note=document.getElementById("f-change").value.trim()||"更新";
  const newVersion={ver,note,date:now,stlUrl:pendingStlUrl||"",imageUrl:pendingImgUrl||""};
  const payload={name,desc:document.getElementById("f-desc").value.trim(),tags:[...selectedTags],curVer:ver,recMat:document.getElementById("f-recmat").value,status:document.getElementById("f-status").value,updatedAt:now,fixRequests:editingId?(products.find(p=>p.id===editingId)?.fixRequests||[]):[],newVersion};
  setBtnLoading("save-btn",true);
  let res;
  if(editingId){
    res=await api(`/products/${editingId}`,"PATCH",payload);
    if(res){const i=products.findIndex(p=>p.id===editingId);if(i>=0)products[i]=res;showToast("✅ 產品已更新","success");}
  }else{
    res=await api("/products","POST",payload);
    if(res){if(res.merged){const i=products.findIndex(p=>p.id===res.id);if(i>=0)products[i]=res;showToast(`🔀 已合併到「${name}」版本 ${ver}`,"success");}else{products.unshift(res);showToast("✅ 產品已新增","success");}}
  }
  setBtnLoading("save-btn",false);
  if(res){closeM("modal-form");render();}
}

async function deleteProduct(id){
  if(!isAdmin)return;
  const p=products.find(x=>x.id===id);
  if(!confirm(`確定要刪除「${p?.name}」嗎？`))return;
  const res=await api(`/products/${id}`,"DELETE");
  if(res?.ok){products=products.filter(x=>x.id!==id);render();showToast("🗑 產品已刪除","info");}
}

function tagIC(){showTDD();}
function showTDD(){
  const v=document.getElementById("tii").value.toLowerCase();

  if(v&&!settings.allTags.find(t=>t.toLowerCase()===v))h+=`<div class="tdi tdn" onmousedown="pickTag('${v}',true)">＋ 新增「${v}」</div>`;
  dd.innerHTML=h||`<div class="tdi" style="color:var(--dimmer)">沒有符合的標籤</div>`;dd.style.display="";
}

function pickTag(t,isNew){if(isNew&&!settings.allTags.includes(t))settings.allTags.push(t);if(!selectedTags.includes(t))selectedTags.push(t);renderTagChips();document.getElementById("tii").value="";hideTDD();}
function tagIK(e){const v=document.getElementById("tii").value.trim();if((e.key==="Enter"||e.key===",")&&v){e.preventDefault();pickTag(v,!settings.allTags.includes(v));}if(e.key==="Backspace"&&!v&&selectedTags.length){selectedTags.pop();renderTagChips();}}

//  THREE.JS
// ════════════════════════════════════════
function parseSTL(buf){
  const geom=new THREE.BufferGeometry(),dv=new DataView(buf);
  const isAscii=new TextDecoder().decode(buf.slice(0,256)).includes("facet");
  if(isAscii){
    const lines=new TextDecoder().decode(buf).split("\n"),v=[],nr=[];let ni=[0,0,0];
    for(const l of lines){const t=l.trim();if(t.startsWith("facet normal")){const p=t.split(/\s+/);ni=[+p[2],+p[3],+p[4]];}else if(t.startsWith("vertex")){const p=t.split(/\s+/);v.push(+p[1],+p[2],+p[3]);nr.push(...ni);}}
    geom.setAttribute("position",new THREE.BufferAttribute(new Float32Array(v),3));
    geom.setAttribute("normal",new THREE.BufferAttribute(new Float32Array(nr),3));
  }else{
    const num=dv.getUint32(80,true),v=new Float32Array(num*9),nr=new Float32Array(num*9);let off=84;
    for(let i=0;i<num;i++){const nx=dv.getFloat32(off,true),ny=dv.getFloat32(off+4,true),nz=dv.getFloat32(off+8,true);off+=12;for(let j=0;j<3;j++){const b=i*9+j*3;v[b]=dv.getFloat32(off,true);v[b+1]=dv.getFloat32(off+4,true);v[b+2]=dv.getFloat32(off+8,true);nr[b]=nx;nr[b+1]=ny;nr[b+2]=nz;off+=12;}off+=2;}
    geom.setAttribute("position",new THREE.BufferAttribute(v,3));geom.setAttribute("normal",new THREE.BufferAttribute(nr,3));
  }
  return geom;
}
function viewer(el,stlUrl,interactive){
  const w=el.clientWidth||260,h=el.clientHeight||160;
  const r=new THREE.WebGLRenderer({antialias:true,alpha:true});r.setSize(w,h);r.setPixelRatio(Math.min(devicePixelRatio,2));
  const s=new THREE.Scene(),c=new THREE.PerspectiveCamera(45,w/h,.01,100000);
  s.add(new THREE.AmbientLight(0xffffff,.5));const d=new THREE.DirectionalLight(0xffffff,1);d.position.set(1,2,3);s.add(d);
  const d2=new THREE.DirectionalLight(0x47b8ff,.25);d2.position.set(-2,-1,1);s.add(d2);
  el.innerHTML="";el.appendChild(r.domElement);
  fetch(stlUrl).then(x=>x.arrayBuffer()).then(buf=>{
    const geom=parseSTL(buf);geom.computeBoundingBox();
    const box=geom.boundingBox,cx=(box.max.x+box.min.x)/2,cy=(box.max.y+box.min.y)/2,cz=(box.max.z+box.min.z)/2;
    const sz=Math.max(box.max.x-box.min.x,box.max.y-box.min.y,box.max.z-box.min.z);
    geom.translate(-cx,-cy,-cz);
    const mat=new THREE.MeshPhongMaterial({color:0xe8ff47,specular:0x222222,shininess:35,side:THREE.DoubleSide});
    const mesh=new THREE.Mesh(geom,mat);s.add(mesh);c.position.z=sz*1.6;
    let rx=0,ry=0,drag=false,last={x:0,y:0};
    if(interactive){
      const hint=document.createElement("div");hint.className="stl-hint";hint.textContent="拖曳旋轉";el.appendChild(hint);
      r.domElement.addEventListener("mousedown",e=>{drag=true;last={x:e.clientX,y:e.clientY};hint.remove();});
      window.addEventListener("mouseup",()=>drag=false);
      window.addEventListener("mousemove",e=>{if(!drag)return;ry+=(e.clientX-last.x)*.005;rx+=(e.clientY-last.y)*.005;last={x:e.clientX,y:e.clientY};});
      r.domElement.addEventListener("touchstart",e=>{drag=true;last={x:e.touches[0].clientX,y:e.touches[0].clientY};hint.remove();},{passive:true});
      window.addEventListener("touchend",()=>drag=false);
      window.addEventListener("touchmove",e=>{if(!drag)return;ry+=(e.touches[0].clientX-last.x)*.005;rx+=(e.touches[0].clientY-last.y)*.005;last={x:e.touches[0].clientX,y:e.touches[0].clientY};});
    }
    (function frame(){requestAnimationFrame(frame);if(!drag)ry+=.005;mesh.rotation.x=rx;mesh.rotation.y=ry;r.render(s,c);})();
  }).catch(()=>{el.innerHTML=`<div class="pholder"><div class="icon">⚠️</div><div style="font-size:11px">無法載入</div></div>`;});
}
function initMini(el,stlUrl){viewer(el,stlUrl,false);}
function initDetailViewer(el,stlUrl){viewer(el,stlUrl,true);}

let batchRows=[];  // [{productId, ver, mat, color, qty}]

function renderNewOrder(){
  // group quick-add buttons
  const bar=document.getElementById("group-quick-bar");
  const btns=document.getElementById("group-quick-btns");
  if(groups.length){
    bar.style.display="";
    btns.innerHTML=groups.map(g=>`<button class="btn bs bsm" onclick="addGroupToOrder('${g.id}')">${g.name} <span style="color:var(--dimmer);font-size:10px">(${g.productIds.length}項)</span></button>`).join("");
  }else bar.style.display="none";
  // init with one empty row
  batchRows=[];
  addBatchRow();
  document.getElementById("batch-date").value=new Date().toISOString().split("T")[0];
  document.getElementById("batch-note").value="";
}

function addGroupToOrder(groupId){
  const g=groups.find(x=>x.id===groupId);
  if(!g)return;
  g.productIds.forEach(pid=>{
    const p=products.find(x=>x.id===pid);
    if(p) addBatchRow(p.id);
  });
  showToast(`✅ 已加入「${g.name}」的 ${g.productIds.length} 個零件`,"success");
}

function addBatchRow(productId=""){
  const id="br-"+Date.now()+"-"+Math.random().toString(36).slice(2,6);
  batchRows.push({id,productId,ver:"",mat:settings.materials[0]||"",color:"",qty:1});
  renderBatchRows();
  // pre-select product if given
  if(productId){
    setTimeout(()=>{
      const sel=document.getElementById(`${id}-product`);
      if(sel){sel.value=productId;onBatchProductChange(id);}
    },50);
  }
}

function removeBatchRow(id){
  batchRows=batchRows.filter(r=>r.id!==id);
  if(!batchRows.length) addBatchRow();
  else renderBatchRows();
}

function renderBatchRows(){
  const container=document.getElementById("batch-rows");
  container.innerHTML=batchRows.map(row=>`
    <div class="batch-row" id="row-${row.id}">
      <div>
        <div class="fl">產品</div>
        <select id="${row.id}-product" onchange="onBatchProductChange('${row.id}')">
          <option value="">— 請選擇 —</option>
          ${products.map(p=>`<option value="${p.id}" ${p.id===row.productId?"selected":""}>${p.name}</option>`).join("")}
        </select>
      </div>
      <div>
        <div class="fl">版本</div>
        <select id="${row.id}-ver">${getBatchVerOpts(row.productId,row.ver)}</select>
      </div>
      <div>
        <div class="fl">材料</div>
        <select id="${row.id}-mat" onchange="onBatchMatChange('${row.id}')">
          ${settings.materials.map(m=>`<option value="${m}" ${m===row.mat?"selected":""}>${m}</option>`).join("")}
        </select>
      </div>
      <div>
        <div class="fl">顏色</div>
        <select id="${row.id}-color">${getBatchColorOpts(row.mat,row.color)}</select>
      </div>
      <div>
        <div class="fl">數量</div>
        <input type="number" id="${row.id}-qty" value="${row.qty||1}" min="1" style="width:60px">
      </div>
      <button class="batch-del-btn" onclick="removeBatchRow('${row.id}')" title="刪除此行">×</button>
    </div>`).join("");
}

function getBatchVerOpts(productId, selectedVer){
  const p=products.find(x=>x.id===productId);
  if(!p||(p.versions||[]).length===0)return `<option value="">—</option>`;
  return p.versions.map(v=>`<option value="${v.ver}" ${v.ver===(selectedVer||p.curVer)?"selected":""}>${v.ver}${v.ver===p.curVer?" ★":""}</option>`).join("");
}

function getBatchColorOpts(mat, selectedColor){
  const bound=settings.matColors[mat];
  const avail=bound&&bound.length?settings.colors.filter(c=>bound.includes(c.name)):settings.colors;
  if(!avail.length)return `<option value="">—</option>`;
  return avail.map(c=>`<option value="${c.name}" ${c.name===selectedColor?"selected":""}>${c.name}</option>`).join("");
}

function onBatchProductChange(rowId){
  const pid=document.getElementById(`${rowId}-product`)?.value;
  const p=products.find(x=>x.id===pid);
  const verSel=document.getElementById(`${rowId}-ver`);
  if(verSel) verSel.innerHTML=getBatchVerOpts(pid,"");
  if(p?.recMat){
    const matSel=document.getElementById(`${rowId}-mat`);
    if(matSel){matSel.value=p.recMat;onBatchMatChange(rowId);}
  }
}

function onBatchMatChange(rowId){
  const mat=document.getElementById(`${rowId}-mat`)?.value;
  const colorSel=document.getElementById(`${rowId}-color`);
  if(colorSel) colorSel.innerHTML=getBatchColorOpts(mat,"");
}

async function submitBatchOrder(){
  // collect rows
  const items=batchRows.map(row=>({
    productId:  document.getElementById(`${row.id}-product`)?.value,
    productName:products.find(x=>x.id===document.getElementById(`${row.id}-product`)?.value)?.name||"",
    ver:        document.getElementById(`${row.id}-ver`)?.value||"",
    material:   document.getElementById(`${row.id}-mat`)?.value||"",
    color:      document.getElementById(`${row.id}-color`)?.value||"",
    qty:        parseInt(document.getElementById(`${row.id}-qty`)?.value)||1,
  })).filter(item=>item.productId);

  if(!items.length){showToast("❗ 請至少選擇一個產品","info");return;}

  const date=document.getElementById("batch-date").value;
  const note=document.getElementById("batch-note").value.trim();

  // If only one item, submit as simple order for backward compat
  setBtnLoading("submit-order-btn",true);
  let res;
  if(items.length===1){
    const it=items[0];
    res=await api("/orders","POST",{
      productId:it.productId,productName:it.productName,productVer:it.ver,
      color:it.color,material:it.material,qty:it.qty,note,status:"unread",date,items:[],
    });
  } else {
    // Batch order
    const batchLabel=items.length<=3 ? items.map(i=>i.productName).join("、") : `批量訂單（${items.length}項）`;
    res=await api("/orders","POST",{
      productId:"",productName:batchLabel,productVer:"",
      color:"",material:"",qty:1,note,status:"unread",date,
      items,batchLabel,
    });
  }
  setBtnLoading("submit-order-btn",false);
  if(res){orders.push(res);updateStats();showToast(`🖨️ 下單成功！共 ${items.length} 項`,"success");go("orders");}
}

function quickOrder(pid){
  go("neworder");
  setTimeout(()=>{
    // clear and add one row for this product
    batchRows=[];
    addBatchRow(pid);
  },60);
}

const OS_LIST=[{key:"unread",label:"未讀"},{key:"received",label:"收到"},{key:"printing",label:"列印中"},{key:"done",label:"已完成"},{key:"delivered",label:"收到成品"}];

function renderOrders(){
  const today=new Date().toISOString().split("T")[0];
  const sorted=[...orders].sort((a,b)=>{
    const aA=["unread","received","printing"].includes(a.status);
    const bA=["unread","received","printing"].includes(b.status);
    if(aA&&!bA)return -1;if(!aA&&bA)return 1;
    if(!a.date)return 1;if(!b.date)return -1;
    return new Date(a.date)-new Date(b.date);
  });
  const tbody=document.getElementById("orders-tbody"),empty=document.getElementById("orders-empty");
  if(!sorted.length){tbody.innerHTML="";empty.style.display="flex";return;}
  empty.style.display="none";
  tbody.innerHTML=sorted.map(o=>{
    const ov=o.date&&o.date<today&&!["done","delivered"].includes(o.status);
    const isBatch=o.items&&o.items.length>0;
    const cc=settings.colors.find(c=>c.name===o.color);
    const nameHtml=isBatch
      ?`<div style="font-weight:600">${o.productName}</div><div class="batch-items">${o.items.map(i=>`<div class="batch-item-row">• ${i.productName} ${i.ver} · ${i.material} ${i.color} ×${i.qty}</div>`).join("")}</div>`
      :`<div style="font-weight:600">${o.productName}</div>${o.productUpdated?`<div style="font-size:10px;color:var(--orange)">⚠ 產品已更新</div>`:""}`;
    return `<tr>
      <td>${nameHtml}</td>
      <td><span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--dimmer)">${isBatch?"—":o.productVer||""}</span></td>
      <td>${isBatch?"—":`<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:50%;background:${cc?cc.hex:"#888"};border:1px solid rgba(255,255,255,.2)"></span>${o.color}</span>`}</td>
      <td>${isBatch?"—":`<span class="tag">${o.material}</span>`}</td>
      <td>${isBatch?`${o.items.reduce((a,i)=>a+i.qty,0)} 組合計`:`${o.qty} 組`}</td>
      <td style="color:var(--dim);font-size:12px;max-width:90px">${o.note||"—"}</td>
      <td><select style="padding:4px 8px;font-size:11px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:inherit;cursor:pointer" onchange="updateOS('${o.id}',this.value)">${OS_LIST.map(s=>`<option value="${s.key}" ${o.status===s.key?"selected":""}>${s.label}</option>`).join("")}</select></td>
      <td style="font-size:12px;${ov?"color:var(--red);font-weight:600":"color:var(--dimmer)"}">${o.date||"—"}${ov?" ⚠":""}</td>
      <td>${isAdmin?`<button class="btn bd bsm" onclick="delOrder('${o.id}')">刪除</button>`:""}</td>
    </tr>`;
  }).join("");
}
async function updateOS(id,status){
  const o=orders.find(x=>x.id===id);if(!o)return;
  const res=await api(`/orders/${id}`,"PATCH",{...o,status,productUpdated:status==="received"?false:o.productUpdated});
  if(res){const i=orders.findIndex(x=>x.id===id);if(i>=0)orders[i]=res;updateStats();}
}
async function delOrder(id){
  if(!isAdmin)return;
  const res=await api(`/orders/${id}`,"DELETE");
  if(res?.ok){orders=orders.filter(x=>x.id!==id);renderOrders();updateStats();showToast("🗑 已刪除","info");}
}

function openM(id){document.getElementById(id).classList.add("open");}
function closeM(id){document.getElementById(id).classList.remove("open");}
document.querySelectorAll(".mo").forEach(el=>el.addEventListener("click",e=>{if(e.target===el)el.classList.remove("open");}));
function setBtnLoading(id,loading){const el=document.getElementById(id);if(!el)return;el.disabled=loading;if(loading){el.dataset.orig=el.textContent;el.textContent="處理中…";}else if(el.dataset.orig){el.textContent=el.dataset.orig;}}
let toastT;
function showToast(msg,type="info"){const el=document.getElementById("toast");el.textContent=msg;el.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("show"),3000);}
</script>
</body>
</html>
